name: CI Tests

on:
  workflow_call:

jobs:

  test-hugo:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Test site build
        run: hugo --minify

  test-dockerfile:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  test-docker-image:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: local/docker-image
          push: false
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@v1
        id: synk-scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: local/docker-image
          args: --file=Dockerfile --sarif-file-output=snyk.sarif
        continue-on-error: true

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: snyk.sarif

      - name: Fail if Sync scan failed
        if: steps.synk-scan.outcome == 'failure'
        run: exit 1

  website-security-testing:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: local/docker-image
          push: false
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run website
        run: |
          docker run -p 8080:80 --name website -d local/docker-image
          timeout 60s bash -c 'until curl -f http://localhost:8080; do sleep 2; done'

      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.13.0
        id: zap-scan
        with:
          target: http://localhost:8080
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: steps.zap-scan.outcome == 'failure'
        with:
          name: zap-scan-report
          path: report_html.html

      - name: Fail if ZAP scan failed
        if: steps.zap-scan.outcome == 'failure'
        run: |
          echo "ZAP scan found vulnerabilities. Check the uploaded artifact report."
          exit 1
